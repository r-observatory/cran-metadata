name: Update CRAN Metadata

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cran-metadata-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install RSQLite
        run: Rscript -e 'install.packages("RSQLite", repos = "https://cloud.r-project.org")'

      - name: Download previous database
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download --pattern "metadata.db"

      - name: Validate downloaded database
        if: hashFiles('metadata.db') != ''
        run: |
          # Verify the DB can be opened by R without NUL byte errors.
          # All tables are rebuilt from CRAN each run, so starting fresh is safe.
          if Rscript -e 'library(RSQLite); con <- dbConnect(SQLite(), "metadata.db"); dbDisconnect(con); cat("OK\n")' 2>/dev/null; then
            echo "Database is valid"
          else
            echo "Database is corrupted — removing to start fresh"
            rm -f metadata.db
          fi

      - name: Run update script
        run: Rscript scripts/update.R metadata.db

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date -u +'%Y%m%d-%H%M%S')"
          gh release create "$TAG" metadata.db \
            --title "CRAN Metadata $TAG" \
            --notes-file release_notes.md \
            --latest

      - name: Update last run timestamp
        continue-on-error: true
        run: |
          echo "Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > last-updated.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last-updated.txt
          git diff --cached --quiet || git commit -m "chore: update last run time"
          git pull --rebase || true
          git push
