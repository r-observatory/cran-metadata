name: Update CRAN Metadata

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cran-metadata-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install RSQLite
        run: Rscript -e 'install.packages("RSQLite", repos = "https://cloud.r-project.org")'

      - name: Download previous database
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download --pattern "metadata.db"

      - name: Sanitize downloaded database
        if: hashFiles('metadata.db') != ''
        continue-on-error: true
        run: |
          # Strip NUL bytes from text columns that may have been contaminated
          # by previous runs. Only check_status_history is append-only and
          # must be preserved; all other tables are rebuilt from scratch.
          sqlite3 metadata.db "
            UPDATE cran_check_details SET output = REPLACE(output, x'00', '') WHERE output LIKE '%' || x'00' || '%';
            UPDATE cran_check_results SET status = REPLACE(status, x'00', '') WHERE status LIKE '%' || x'00' || '%';
            UPDATE check_status_history SET details = REPLACE(details, x'00', '') WHERE details LIKE '%' || x'00' || '%';
            UPDATE check_status_history SET flavor_summary = REPLACE(flavor_summary, x'00', '') WHERE flavor_summary LIKE '%' || x'00' || '%';
          " || echo "Sanitization failed — will start fresh"

      - name: Run update script
        run: Rscript scripts/update.R metadata.db

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date -u +'%Y%m%d-%H%M%S')"
          gh release create "$TAG" metadata.db \
            --title "CRAN Metadata $TAG" \
            --notes-file release_notes.md \
            --latest

      - name: Update last run timestamp
        continue-on-error: true
        run: |
          echo "Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > last-updated.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last-updated.txt
          git diff --cached --quiet || git commit -m "chore: update last run time"
          git pull --rebase || true
          git push
