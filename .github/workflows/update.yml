name: Update CRAN Metadata

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cran-metadata-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install RSQLite
        run: Rscript -e 'install.packages("RSQLite", repos = "https://cloud.r-project.org")'

      - name: Download previous database
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download --pattern "metadata.db"

      - name: Validate downloaded database
        if: hashFiles('metadata.db') != ''
        continue-on-error: true
        run: |
          # The previous metadata.db may contain NUL bytes that crash RSQLite.
          # Preserve only check_status_history (append-only) and start fresh
          # for all other tables (they are rebuilt from CRAN each run).
          if sqlite3 metadata.db "SELECT COUNT(*) FROM check_status_history;" > /dev/null 2>&1; then
            echo "Extracting check_status_history..."
            sqlite3 metadata.db ".dump check_status_history" | grep -v "^CREATE" > /tmp/csh_data.sql
            rm metadata.db
            sqlite3 metadata.db "
              CREATE TABLE check_status_history (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                package TEXT NOT NULL,
                status TEXT NOT NULL,
                flavor_summary TEXT,
                details TEXT,
                detected_at TEXT NOT NULL
              );
              CREATE INDEX idx_csh_package ON check_status_history (package);
              CREATE INDEX idx_csh_detected ON check_status_history (detected_at);
            "
            sqlite3 metadata.db < /tmp/csh_data.sql
            ROWS=$(sqlite3 metadata.db "SELECT COUNT(*) FROM check_status_history;")
            echo "Preserved $ROWS check_status_history rows in clean DB"
          else
            echo "Could not read DB — starting fresh"
            rm -f metadata.db
          fi

      - name: Run update script
        run: Rscript scripts/update.R metadata.db

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date -u +'%Y%m%d-%H%M%S')"
          gh release create "$TAG" metadata.db \
            --title "CRAN Metadata $TAG" \
            --notes-file release_notes.md \
            --latest

      - name: Update last run timestamp
        continue-on-error: true
        run: |
          echo "Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > last-updated.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last-updated.txt
          git diff --cached --quiet || git commit -m "chore: update last run time"
          git pull --rebase || true
          git push
