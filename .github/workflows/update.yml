name: Update CRAN Metadata

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cran-metadata-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install RSQLite
        run: Rscript -e 'install.packages("RSQLite", repos = "https://cloud.r-project.org")'

      - name: Download previous database
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download --pattern "metadata.db"

      - name: Validate downloaded database
        if: hashFiles('metadata.db') != ''
        run: |
          # Test if update.R can actually open and use this DB.
          # RSQLite crashes on NUL bytes in TEXT columns. All metadata tables
          # are rebuilt each run, so starting fresh is safe (one-time loss of
          # check_status_history is acceptable).
          Rscript -e '
            library(RSQLite)
            con <- dbConnect(SQLite(), "metadata.db")
            tryCatch({
              dbExecute(con, "CREATE TABLE IF NOT EXISTS check_status_history (
                id INTEGER PRIMARY KEY AUTOINCREMENT,
                package TEXT NOT NULL, status TEXT NOT NULL,
                flavor_summary TEXT, details TEXT, detected_at TEXT NOT NULL)")
              dbGetQuery(con, "SELECT COUNT(*) FROM check_status_history")
              cat("Database OK\n")
            }, error = function(e) {
              cat("Database corrupted:", conditionMessage(e), "\n")
              dbDisconnect(con)
              file.remove("metadata.db")
              cat("Removed — will start fresh\n")
            })
            if (file.exists("metadata.db")) dbDisconnect(con)
          '

      - name: Run update script
        run: Rscript scripts/update.R metadata.db

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v$(date -u +'%Y%m%d-%H%M%S')"
          gh release create "$TAG" metadata.db \
            --title "CRAN Metadata $TAG" \
            --notes-file release_notes.md \
            --latest

      - name: Update last run timestamp
        continue-on-error: true
        run: |
          echo "Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > last-updated.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last-updated.txt
          git diff --cached --quiet || git commit -m "chore: update last run time"
          git pull --rebase || true
          git push
